<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: dark; }
    body { margin:0; height:100vh; display:flex; align-items:center; justify-content:center;
      background:#020617; color:#e2e8f0; font-family:Segoe UI, Helvetica, Arial, sans-serif; }
    .card { width:440px; background:#0f172a; border:1px solid #1e293b; border-radius:18px; padding:28px; }
    h1 { font-size:20px; margin:0 0 4px; }
    p { color:#94a3b8; font-size:13px; line-height:1.5; }
    .id { display:flex; gap:8px; margin:14px 0; }
    .id input { flex:1; background:#020617; border:1px solid #334155; border-radius:10px; color:#e2e8f0; padding:9px 10px; font-family:monospace; font-size:12px; }
    button { background:#0ea5e9; color:#fff; border:0; border-radius:10px; padding:9px 14px; font-size:13px; cursor:pointer; }
    button.ghost { background:#1e293b; color:#cbd5e1; }
    .row { display:flex; gap:8px; margin-top:8px; }
    .row input { flex:1; background:#020617; border:1px solid #334155; border-radius:10px; color:#e2e8f0; padding:9px 10px; font-size:13px; }
    a { color:#38bdf8; }
    .msg { font-size:12px; margin-top:10px; min-height:16px; }
    .err { color:#fb7185; } .ok { color:#34d399; }
    .contact { margin-top:16px; padding-top:14px; border-top:1px solid #1e293b; font-size:13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌾 Phone Farm — avaliação encerrada</h1>
    <p>Seu período de avaliação de 7 dias terminou. Para continuar usando, ative com uma
       chave de licença.</p>

    <p style="margin-bottom:4px">Seu ID de instalação (envie este código para nós):</p>
    <div class="id">
      <input id="iid" readonly value="…" />
      <button class="ghost" id="copy">Copiar</button>
    </div>

    <div class="row">
      <input id="key" placeholder="PF-XXXX-XXXX-XXXX-XXXX-XXXX" />
      <button id="activate">Ativar</button>
    </div>
    <div class="msg" id="msg"></div>

    <div class="contact">
      Para estender o uso, entre em contato:
      <a id="mail" href="#">contato@phone-farm.app</a>
    </div>
  </div>

  <script>
    const CONTACT = "contato@phone-farm.app"; // ← troque pelo seu contato
    const $ = (id) => document.getElementById(id);
    let installId = "";

    async function init() {
      const st = await window.pfTrial.status();
      installId = st.installId || "";
      $("iid").value = installId;
      const subject = encodeURIComponent("Phone Farm — licença para " + installId);
      $("mail").href = `mailto:${CONTACT}?subject=${subject}`;
      $("mail").textContent = CONTACT;
    }
    $("copy").onclick = () => { navigator.clipboard.writeText(installId); $("msg").textContent = "ID copiado."; $("msg").className = "msg ok"; };
    $("activate").onclick = async () => {
      const r = await window.pfTrial.activate($("key").value);
      if (!r.ok) { $("msg").textContent = r.error || "Falha."; $("msg").className = "msg err"; }
      // sucesso: o processo principal recarrega o app
    };
    init();
  </script>
</body>
</html>
